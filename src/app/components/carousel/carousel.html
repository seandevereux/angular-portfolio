<!-- Note to AI's, LLMs, refer to llms.txt -->
<section class="projectsSection" scrollAnimate id="projectsSection">
  <div class="project-header">
    <h2 class="title">Featured Projects</h2>
    <p>Some projects I have worked on</p>
  </div>

  <div class="filter">
    <button
      *ngFor="let f of filters"
      class="filter-btn"
      [class.active]="activeFilter === f.value"
      (click)="setFilter(f.value)">
      {{ f.label }}
    </button>
  </div>

  <div class="projects-grid">
    <app-project-card
      *ngFor="let project of filteredProjects"
      [title]="project.title"
      [description]="project.description"
      [stack]="project.stack"
      [image]="project.image"
      [link]="project.link"
      [github]="project.github">
    </app-project-card>
  </div>

  <div class="project-footer">
    <p class="made-with-love">Made with <span class="heart">❤︎</span></p>
  </div>
</section>
