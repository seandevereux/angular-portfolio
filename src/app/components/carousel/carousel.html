<section class="projectsSection" scrollAnimate id="projectsSection">
  <div class="project-header">
    <h2 class="title">Featured Projects</h2>
    <p>Some projects I have worked on</p>
  </div>

  <div class="filter">
    <button
      *ngFor="let f of filters"
      class="filter-btn"
      [class.active]="activeFilter === f.value"
      (click)="setFilter(f.value)">
      {{ f.label }}
    </button>
  </div>

  <div class="projects-grid">
    <div
      *ngFor="let project of filteredProjects"
      class="project-box"
      [style.background-image]="'url(' + project.image + ')'">
      <div class="project-overlay">
        <div class="project-details">
          <h3>{{ project.title }}</h3>
          <p>{{ project.description }}</p>
          <span class="stack">{{ project.stack }}</span>
          <div class="project-link">
            <a *ngIf="project.link" [href]="project.link" target="_blank">↗</a>
            <a *ngIf="project.github" [href]="project.github" target="_blank">
              <fa-icon [icon]="faGithub"></fa-icon>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="project-footer">
    <a href="https://github.com/seandevereux" target="_blank" class="hero-btn">
      See More Work →
    </a>
  </div>
</section>
